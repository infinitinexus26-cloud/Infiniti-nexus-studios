<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:white;
    font-family:Arial;
}

/* HERO */
.hero {
    position:relative;
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background-size:cover;
    background-position:center;
}

.hero::after {
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to top,#0a0a0a,transparent);
}

.hero-content {
    position:relative;
    z-index:2;
}

h1 { color:#8b00ff; }

.btn {
    padding:15px 30px;
    border:1px solid #8b00ff;
    background:transparent;
    color:white;
    cursor:pointer;
}

.btn:hover {
    border-color:#00f0ff;
    box-shadow:0 0 15px #00f0ff;
}

/* TRAILER */
.trailer {
    position:relative;
    max-width:800px;
    margin:50px auto;
    cursor:pointer;
}

.trailer img {
    width:100%;
    border:1px solid #8b00ff;
}

.play {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:50px;
    color:#00f0ff;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

.modal iframe {
    width:80%;
    height:80%;
}

.close {
    position:absolute;
    top:20px;
    right:40px;
    font-size:30px;
    cursor:pointer;
}

/* GALLERY */
.gallery {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
    padding:20px;
}

.gallery img {
    width:100%;
    border:1px solid #8b00ff;
    transition:0.3s;
}

.gallery img:hover {
    transform:scale(1.05);
    border-color:#00f0ff;
}
</style>
</head>

<body>

<section class="hero" id="hero">
    <div class="hero-content">
        <h1 id="title"></h1>
        <p id="desc"></p>
        <button class="btn">Download</button>
    </div>
</section>

<div class="trailer" onclick="openTrailer()">
    <img id="thumb">
    <div class="play">▶</div>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
    <span class="close" onclick="closeTrailer()">✖</span>
    <iframe id="video" src="" frameborder="0" allowfullscreen></iframe>
</div>

<script src="game.js"></script>

</body>
</html>
